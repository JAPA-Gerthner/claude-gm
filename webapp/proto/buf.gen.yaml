version: v2
plugins:
  # Go - for claude-cli service
  - remote: buf.build/connectrpc/go:v1.16.2
    out: ../claude-cli/gen
    opt:
      - paths=source_relative

  - remote: buf.build/protocolbuffers/go:v1.33.0
    out: ../claude-cli/gen
    opt:
      - paths=source_relative

  # TypeScript/ES - for frontend and backend
  - remote: buf.build/connectrpc/es:v1.6.1
    out: ../frontend/src/gen
    opt:
      - target=ts

  - remote: buf.build/bufbuild/es:v1.10.0
    out: ../frontend/src/gen
    opt:
      - target=ts

  # Copy to backend too
  - remote: buf.build/connectrpc/es:v1.6.1
    out: ../backend/src/gen
    opt:
      - target=ts

  - remote: buf.build/bufbuild/es:v1.10.0
    out: ../backend/src/gen
    opt:
      - target=ts
