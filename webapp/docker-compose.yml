services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASS:-secretpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  claude-cli:
    build: ./claude-cli
    environment:
      - PROJECT_DIR=/app/gm-skill
      - SESSIONS_DIR=/home/node/.claude/projects/-app-gm-skill
      - HOME=/home/node
      - SHELL=/bin/bash
    volumes:
      - ${HOME}/.claude:/home/node/.claude
      - ${HOME}/.claude.json:/home/node/.claude.json
      - ../:/app/gm-skill:ro
    expose:
      - "3001"

  backend:
    build: ./backend
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://${PG_USER:-postgres}:${PG_PASS:-secretpassword}@postgres:5432/questkeeper
      - CLAUDE_SERVICE_URL=http://claude-cli:3001
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - CASDOOR_ISSUER=http://casdoor:8000
      - CASDOOR_CLIENT_ID=${CASDOOR_CLIENT_ID:-questkeeper-client}
      - CASDOOR_CLIENT_SECRET=${CASDOOR_CLIENT_SECRET}
      - CASDOOR_REDIRECT_URI=http://localhost:8080/api/auth/callback
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      claude-cli:
        condition: service_started
      casdoor:
        condition: service_healthy
    expose:
      - "3000"

  frontend:
    build: ./frontend
    environment:
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    expose:
      - "5173"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  minio:
    image: pgsty/minio:latest
    command: server /data --console-address ":9001"
    depends_on:
      casdoor:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS:-minioadmin}
      MINIO_IDENTITY_OPENID_ENABLE: "on"
      MINIO_IDENTITY_OPENID_CONFIG_URL: http://casdoor:8000/.well-known/openid-configuration
      MINIO_IDENTITY_OPENID_CLIENT_ID: minio-client
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: minio-secret-2024
      MINIO_IDENTITY_OPENID_SCOPES: openid,profile,email
      MINIO_IDENTITY_OPENID_REDIRECT_URI: http://localhost:9001/oauth_callback
      MINIO_IDENTITY_OPENID_CLAIM_NAME: policy
      MINIO_IDENTITY_OPENID_DISPLAY_NAME: "Login with Casdoor"
      MINIO_IDENTITY_OPENID_ROLE_POLICY: consoleAdmin
      MINIO_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC: "on"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  casdoor:
    image: casbin/casdoor:latest
    environment:
      RUNNING_IN_DOCKER: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./casdoor/app.conf:/conf/app.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 10

  casdoor-setup:
    image: curlimages/curl:latest
    entrypoint: ["/bin/sh", "/setup/setup.sh"]
    volumes:
      - ./casdoor/setup.sh:/setup/setup.sh:ro
    depends_on:
      casdoor:
        condition: service_healthy
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./pgadmin/config_local.py:/pgadmin4/config_local.py:ro
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # GlitchTip - Error tracking (Sentry-compatible)
  glitchtip:
    image: glitchtip/glitchtip:latest
    environment:
      DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASS:-secretpassword}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
      GLITCHTIP_DOMAIN: http://localhost:8090
      DEFAULT_FROM_EMAIL: noreply@localhost
      EMAIL_URL: consolemail://
      ENABLE_ORGANIZATION_CREATION: "true"
      CELERY_WORKER_CONCURRENCY: 2
      # Casdoor OIDC (for setup script)
      CASDOOR_CLIENT_ID: glitchtip-client
      CASDOOR_CLIENT_SECRET: glitchtip-secret-2024
      CASDOOR_URL: http://casdoor:8000
    volumes:
      - ./glitchtip/setup_oidc.py:/setup/setup_oidc.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    ports:
      - "8090:8000"

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASS:-secretpassword}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
      GLITCHTIP_DOMAIN: http://localhost:8090
      CELERY_WORKER_CONCURRENCY: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://nginx:80
    depends_on:
      - nginx

volumes:
  postgres_data:
  minio_data:
  redis_data:
